spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:backend}?useSSL=${DB_SSL:false}&allowPublicKeyRetrieval=${DB_ALLOW_PUBLIC_KEY:true}&serverTimezone=UTC
spring.datasource.username=${DB_USER:backend}
spring.datasource.password=${DB_PASSWORD:backend}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
app.security.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me}
